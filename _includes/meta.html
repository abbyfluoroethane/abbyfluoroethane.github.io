{% assign meta_description = page.description %}
{% unless meta_description %}
  {% assign meta_description = page.content | strip_html | strip_newlines | strip | truncatewords: 30 %}
{% endunless %}
{% if meta_description == blank %}
  {% assign meta_description = site.description %}
{% endif %}

<!-- Primary Meta Tags -->
<meta name="title" content="{{ page.title | default: site.title }}">
<meta name="description" content="{{ meta_description }}">
<meta name="author" content="Abby Bigaouette">

<!-- Theme Color -->
<meta name="theme-color" content="#ffffff">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ meta_description }}">
<meta property="og:image" content="{{ '/assets/images/og-image.png' | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{ page.url | absolute_url }}">
<meta property="twitter:title" content="{{ page.title | default: site.title }}">
<meta property="twitter:description" content="{{ meta_description }}">
<meta property="twitter:image" content="{{ '/assets/images/og-image.png' | absolute_url }}">

<!-- Fediverse / Mastodon -->
<meta name="fediverse:creator" content="@abbyfluoroethane@dorm.social">
