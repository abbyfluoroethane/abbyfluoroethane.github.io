<form class="guestbook-form" action="https://guestbook.abbypaigeisnthere.workers.dev" method="POST">
  <!-- Honeypot — hidden from real users, attracts bots -->
  <div style="position: absolute; left: -9999px;" aria-hidden="true">
    <label for="guestbook-url">Leave this empty</label>
    <input type="text" id="guestbook-url" name="url" tabindex="-1" autocomplete="off">
  </div>
  <div class="guestbook-field">
    <label for="guestbook-name">Name <span style="color: var(--accent);">*</span></label>
    <input type="text" id="guestbook-name" name="name" required maxlength="100" placeholder="Your name">
  </div>
  <div class="guestbook-field">
    <label for="guestbook-website">Website</label>
    <input type="url" id="guestbook-website" name="website" maxlength="200" placeholder="https://example.com">
  </div>
  <div class="guestbook-field">
    <label for="guestbook-message">Message <span style="color: var(--accent);">*</span></label>
    <textarea id="guestbook-message" name="message" required maxlength="1000" rows="4" placeholder="Say hi! Moof!"></textarea>
  </div>
  <div class="guestbook-submit">
    <button type="submit" class="btn btn-default">Sign Guestbook</button>
  </div>
</form>

<!-- Confirmation/error dialog -->
<div id="guestbook-modal" class="modal-overlay hidden">
  <div class="window standard-dialog" style="max-width: 340px; width: 100%;">
    <div class="window-pane" style="padding: 1.5rem; text-align: center;">
      <p id="guestbook-modal-message" style="margin: 0 0 1.25rem 0; font-family: Chicago, serif;"></p>
      <button id="guestbook-modal-ok" class="btn btn-default" style="min-width: 80px;">OK</button>
    </div>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var msg = null;

  if (params.get('signed') === 'true') {
    msg = 'Thanks for signing the guestbook! Your entry will appear in a minute or two.';
  } else if (params.get('error') === 'fields') {
    msg = 'Please fill in both your name and a message.';
  } else if (params.get('error') === 'server') {
    msg = 'Something went wrong. Please try again later.';
  }

  if (!msg) return;

  var modal = document.getElementById('guestbook-modal');
  var text = document.getElementById('guestbook-modal-message');
  var ok = document.getElementById('guestbook-modal-ok');

  text.textContent = msg;
  modal.classList.remove('hidden');
  ok.focus();

  ok.addEventListener('click', function () {
    modal.classList.add('hidden');
    history.replaceState(null, '', window.location.pathname);
  });
})();
</script>
