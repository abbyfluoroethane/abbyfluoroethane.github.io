{% assign embed_url = include.url | replace: "https://music.apple.com", "https://embed.music.apple.com" %}

    frameborder="0"
    height="175"
    class="songlink-embed"
    sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
    src="{{ embed_url }}">
  </iframe>
